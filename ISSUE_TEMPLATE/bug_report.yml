name: Bug report
description: Something doesn't work the way it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The clearer
        the repro, the faster we can fix it.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug — what you saw vs. what you expected.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: |
        Minimal steps. If it's a compiler bug, include the YAML schema
        that triggers it.
      render: yaml
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `holocron --version` (or which crates.io release).
      placeholder: "0.3.0"
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      description: OS + architecture (e.g. macOS arm64, Linux x86_64).
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output / error
      description: Paste the error message, stack trace, or LSP log if helpful.
      render: text
    validations:
      required: false